# Example for using the keymap-drawer ZMK user config workflow
name: Draw ZMK keymaps
on:
  workflow_dispatch:  # can be triggered manually
  push:               # automatically run on changes to following paths
    paths:
      - 'config/*.keymap'
      - 'config/*.dtsi'
      - keymap-drawer/config.yaml
      - .github/workflows/draw.yml

jobs:
  draw:
    uses: caksoylar/keymap-drawer/.github/workflows/draw-zmk.yml@main
    permissions:
      contents: write  # allow workflow to commit to the repo
    with:
      keymap_patterns: 'config/*.keymap'        # path to the keymaps to parse
      config_path: keymap-drawer/config.yaml  # config file, ignored if not exists
      output_folder: keymap-drawer            # path to save produced SVG and keymap YAML files
      install_branch: main
      amend_commit: true
      draw_args: "wizza:'--ghost-keys 4 5 14 15 20 21 22 23 24 25'"   # map of extra args to pass to `keymap draw`, e.g. "corne:'-k corne_rotated' cradio:'-k paroxysm'"