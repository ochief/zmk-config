# configuration for https://github.com/caksoylar/keymap-drawer
parse_config:
  zmk_combos:
    # combo_c_w:          {draw_separate: true}
      combo_c_k:          {a: top, offset: 0.2}
      combo_c_j:          {a: bottom, offset: 0.2}
      combo_c_screen:     {a: top, offset: 0.3, w: 90}
      combo_c_capslock:   {a: top, offset: 0.3, w: 90}
      combo_c_con_space:  {a: top, offset: 0.3, w: 90}
      combo_c_sys_layer:  {a: bottom, offset: 0.3, w: 90}
      combo_c_sho_layer:  {a: bottom, offset: 0.6, w: 90}

  raw_binding_map:
    '&equal'        : '='
    '&comma'        : ','
    '&dot'          : '.'
    '&kp NUBS'      : '\'
    '&kp LS(N2)'    : '"'
    '&kp LS(SQT)'   : '@'
    '&kp LS(NUBS)'  : '|'
    '&kp LS(NUHS)'  : '~'

    '&kp RA(N4)'    : '€'
    '&kp LS(N4)'    : '$'
    '&kp LS(N3)'    : '£'

    '&kp LC(A)'     : 'SELALL'
    '&kp LC(Y)'     : 'REDO'
    '&kp LC(Z)'     : 'UNDO'
    '&kp LC(X)'     : 'CUT'
    '&kp LC(C)'     : 'COPY'
    '&kp LC(V)'     : 'PASTE'
    '&kp LC(LS(V))' : 'SPASTE'  
    '&kp LC(DEL)'   : 'DWORD F'
    '&kp LC(BSPC)'  : 'DWORD B' 
    '&kp LC(HOME)'  : 'BEG DOC'
    '&kp LC(END)'   : 'END DOC'

    '&kp LG(X)'     : 'WIN+X'
    '&kp LC(LS(L))' : 'BITWAR'
    '&kp LC(LS(O))' : 'ONELOG'
    '&kp LG(LS(S))' : 'SCREENSHOT'

    '&swapper'      : 'SWAPPER'
    '&smart_shft'   : 'SHIFT'
    'SMART_NUM'     : 'NUM WORD'
    '&tri_grave'    : '```'
    '&con_space'    : 'CONT  SPC'
    '&sho_layer'    : 'SHORTCUTS'

    '&bt BT_SEL 0'  : 'BT-0'
    '&bt BT_SEL 1'  : 'BT-1'
    '&bt BT_SEL 2'  : 'BT-2'

    '&sys_reset'    : 'RESET'
    '&bootloader'   : 'BOOT'

  trans_legend:
    t: ''
    type: trans

  zmk_keycode_map:
    LCTRL: CTRL
    RCTRL: CTRL
    LALT: ALT
    RALT: ALT
    LGUI: GUI
    RGUI: GUI
    LSHFT: SHIFT
    RSHFT: SHIFT
    ESC: ESC
    SPACE: SPACE
    BSPC: BSPC
    RET: ENT
    TAB: TAB
    DEL: DEL

    PG_UP: PG UP
    PG_DN: PG DN
    INS: INS
    HOME: HOME
    END: END
    CAPS: CAPS  LOCK
    PSCRN: Print Scrn
    PAUSE_BREAK: Pause Break

    UP: UP
    DOWN: DOWN
    LEFT: LEFT
    RIGHT: RIGHT

    C_PP: PLAY PAUSE
    C_NEXT: NEXT
    C_PREV: PREV

    # defaults
    AMPERSAND: '&'
    AMPS: '&'
    APOS: "'"
    APOSTROPHE: "'"
    ASTERISK: '*'
    ASTRK: '*'
    AT: '@'
    AT_SIGN: '@'
    BACKSLASH: \
    BSLH: \
    CARET: ^
    COLON: ':'
    COMMA: ','
    DLLR: $
    DOLLAR: $
    DOT: .
    DOUBLE_QUOTES: '"'
    DQT: '"'
    EQUAL: '='
    EXCL: '!'
    EXCLAMATION: '!'
    FSLH: /
    GRAVE: '`'
    GREATER_THAN: '>'
    GT: '>'
    HASH: '#'
    LBKT: '['
    LBRC: '{'
    LEFT_BRACE: '{'
    LEFT_BRACKET: '['
    LEFT_PARENTHESIS: (
    LESS_THAN: <
    LPAR: (
    LT: <
    MINUS: '-'
    NON_US_BACKSLASH: \
    NON_US_BSLH: '|'
    NON_US_HASH: '#'
    NUHS: '#'
    PERCENT: '%'
    PERIOD: .
    PIPE: '|'
    PIPE2: '|'
    PLUS: +
    POUND: '#'
    PRCNT: '%'
    QMARK: '?'
    QUESTION: '?'
    RBKT: ']'
    RBRC: '}'
    RIGHT_BRACE: '}'
    RIGHT_BRACKET: ']'
    RIGHT_PARENTHESIS: )
    RPAR: )
    SEMI: ;
    SEMICOLON: ;
    SINGLE_QUOTE: ''''
    SLASH: /
    SQT: ''''
    STAR: '*'
    TILDE: '~'
    TILDE2: '~'
    UNDER: _
    UNDERSCORE: _

draw_config:
  n_columns: 1
  shrink_wide_legends: 15

  svg_style: ''
  svg_extra_style: |
    .layer-SYS .keypos-26 .key,
    .layer-SYS .keypos-29 .key,
    .layer-SHO .keypos-27 .key,
    .layer-SHO .keypos-28 .key {
      fill: #fdd;
    }

    /* color accent for ghost (optional) keys */
    rect.ghost, rect.combo.ghost {
      display: none;
    }