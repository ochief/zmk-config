layout: {qmk_keyboard: berylline}
layers:
  base:
  - {t: R, h: LGUI}
  - {t: S, h: LALT}
  - {t: T, h: LSHFT}
  - {t: H, h: LCTRL}
  - {type: trans}
  - {type: trans}
  - {t: N, h: LCTRL}
  - {t: A, h: RSHFT}
  - {t: I, h: LALT}
  - {t: O, h: LGUI}
  - Q
  - C
  - G
  - D
  - {type: trans}
  - {type: trans}
  - L
  - U
  - Y
  - ''''
  - {type: trans}
  - {type: trans}
  - {type: trans}
  - {type: trans}
  - {type: trans}
  - {type: trans}
  - SPACE
  - {type: trans}
  - E
  - {t: LSHFT, h: sticky}
combos:
- p: [0, 1]
  k: W
  l: [base]
- p: [1, 2]
  k: M
  l: [base]
- p: [2, 3]
  k: B
  l: [base]
- p: [3, 6]
  k: K
  l: [base]
- p: [6, 7]
  k: {t: /, s: \}
  l: [base]
- p: [7, 8]
  k: {t: ',', s: '?'}
  l: [base]
- p: [8, 9]
  k: {t: ., s: '!'}
  l: [base]
- p: [10, 11]
  k: Q
  l: [base]
- p: [11, 12]
  k: F
  l: [base]
- p: [12, 13]
  k: P
  l: [base]
- p: [13, 16]
  k: J
  l: [base]
